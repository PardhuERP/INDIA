<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INDIA Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#020617,#0f172a);
color:#fff;
margin:0;
padding:12px;
}

.header{
text-align:center;
font-size:24px;
font-weight:bold;
margin:20px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.card{
background:#1e293b;
padding:18px 10px;
border-radius:14px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.4);
transition:.2s;
}

.card:hover{
background:#334155;
transform:scale(1.04);
}

.icon{
font-size:28px;
margin-bottom:8px;
}

.title{
font-size:14px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
🇮🇳 INDIA Dashboard
</div>

<div class="grid">

<div class="card" onclick="openReport('Financial Year')">
<div class="icon">📊</div>
<div class="title">Month Summary</div>
</div>

<div class="card" onclick="openReport('Planning')">
<div class="icon">📋</div>
<div class="title">Planning</div>
</div>

<div class="card" onclick="openReport('Voucher')">
<div class="icon">💰</div>
<div class="title">Voucher</div>
</div>

<div class="card" onclick="openReport('Works')">
<div class="icon">🏗️</div>
<div class="title">Works</div>
</div>

<div class="card" onclick="openReport('Assets')">
<div class="icon">🏛️</div>
<div class="title">Assets</div>
</div>

<div class="card" onclick="openReport('Audit')">
<div class="icon">🧾</div>
<div class="title">Audit</div>
</div>

<div class="card" onclick="openReport('GP Profile')">
<div class="icon">🏠</div>
<div class="title">GP Profile</div>
</div>

<div class="card" onclick="openReport('Settings')">
<div class="icon">⚙️</div>
<div class="title">Settings</div>
</div>

<div class="card" onclick="openReport('About')">
<div class="icon">ℹ️</div>
<div class="title">About</div>
</div>

</div>

<script>

function openReport(report){

    localStorage.setItem("selectedReport", report);

    window.location.href="index.html";

}

</script>

</body>
</html>
