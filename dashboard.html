<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INDIA Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
padding:15px;
background:linear-gradient(180deg,#020617,#0f172a);
color:#fff;
}

.header{
text-align:center;
font-size:26px;
font-weight:bold;
margin-bottom:15px;
}

.subheader{
text-align:center;
color:#94a3b8;
margin-bottom:20px;
}

.gp-card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.4);
}

.gp-title{
font-size:13px;
color:#94a3b8;
margin-bottom:8px;
}

#gpName{
font-size:22px;
font-weight:bold;
}

#gpLocation{
margin-top:5px;
font-size:14px;
color:#cbd5e1;
}

.change-btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:18px 8px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.4);
transition:.2s;
}

.card:hover{
background:#334155;
transform:scale(1.04);
}

.icon{
font-size:30px;
margin-bottom:8px;
}

.title{
font-size:14px;
font-weight:bold;
}

@media(max-width:700px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<div class="header">

🇮🇳 INDIA

</div>

<div class="subheader">

Gram Panchayat Dashboard

</div>

<div class="gp-card">

<div class="gp-title">

📍 Current Gram Panchayat

</div>

<div id="gpName">

Not Selected

</div>

<div id="gpLocation">

Please select Gram Panchayat

</div>

<button class="change-btn" onclick="changeGP()">

🔍 Change Gram Panchayat

</button>

</div>

<div class="grid">

<div class="card" onclick="openReport('Financial Year')">
<div class="icon">📊</div>
<div class="title">Month Summary</div>
</div>

<div class="card" onclick="openReport('Planning')">
<div class="icon">📋</div>
<div class="title">Planning</div>
</div>

<div class="card" onclick="openReport('Voucher')">
<div class="icon">💰</div>
<div class="title">Voucher</div>
</div>

<div class="card" onclick="openReport('Works')">
<div class="icon">🏗️</div>
<div class="title">Works</div>
</div>

<div class="card" onclick="openReport('Assets')">
<div class="icon">🏛️</div>
<div class="title">Assets</div>
</div>

<div class="card" onclick="openReport('Audit')">
<div class="icon">🧾</div>
<div class="title">Audit</div>
</div>

<div class="card" onclick="openReport('GP Profile')">
<div class="icon">🏡</div>
<div class="title">GP Profile</div>
</div>

<div class="card" onclick="openReport('Registers')">
<div class="icon">📚</div>
<div class="title">Registers</div>
</div>

<div class="card" onclick="openReport('Settings')">
<div class="icon">⚙️</div>
<div class="title">Settings</div>
</div>

</div>

<script>

loadCurrentGP();

function loadCurrentGP(){

const gp=JSON.parse(localStorage.getItem("currentGP"));

if(!gp) return;

document.getElementById("gpName").innerHTML=gp.gpName;

document.getElementById("gpLocation").innerHTML=
gp.subDistrictName+" • "+gp.districtName;

}

function changeGP(){

window.location.href="index.html";

}

function openReport(report){

localStorage.setItem("selectedReport",report);

window.location.href="index.html";

}

</script>

</body>
</html>
